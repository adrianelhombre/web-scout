<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Scouting Cantera</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <main class="login-layout">
      <section class="card login-card">
        <h1>Scouting Cantera Zaragoza</h1>
        <p class="muted">Acceso interno para ojeadores del club.</p>

        <form id="loginForm" class="grid" style="grid-template-columns: 1fr; margin-top: 1rem">
          <div class="form-group">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" required />
          </div>

          <div class="form-group">
            <label for="password">Contraseña</label>
            <input id="password" name="password" type="password" required />
          </div>

          <button class="btn btn-primary" type="submit">Iniciar sesión</button>
          <p id="loginMessage" class="message"></p>
        </form>
      </section>
    </main>

    <script type="module">
      import { redirectIfLoggedIn, loginWithEmail } from './js/auth.js';

      await redirectIfLoggedIn();

      const form = document.getElementById('loginForm');
      const message = document.getElementById('loginMessage');

      form.addEventListener('submit', async (event) => {
        event.preventDefault();

        const email = form.email.value.trim();
        const password = form.password.value;

        const { error } = await loginWithEmail(email, password);

        if (error) {
          message.textContent = `No se pudo iniciar sesión: ${error.message}`;
          message.className = 'message error';
          return;
        }

        message.textContent = 'Login correcto. Redirigiendo...';
        message.className = 'message success';
        window.location.href = 'index.html';
      });
    </script>
  </body>
</html>
